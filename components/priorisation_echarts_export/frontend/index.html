<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      .chart-host {
        position: absolute;
        left: -10000px;
        top: 0;
        visibility: hidden;
        width: 1200px;
      }
    </style>
  </head>
  <body>
    <div id="charts-root"></div>

    <script>
      (function () {
        var RENDER_EVENT = "streamlit:render";
        var Streamlit = {
          API_VERSION: 1,
          RENDER_EVENT: RENDER_EVENT,
          events: new EventTarget(),
          registeredMessageListener: false,
          lastFrameHeight: null,
          setComponentReady: function () {
            if (!Streamlit.registeredMessageListener) {
              window.addEventListener("message", Streamlit.onMessageEvent);
              Streamlit.registeredMessageListener = true;
            }
            Streamlit.sendBackMsg("streamlit:componentReady", {
              apiVersion: Streamlit.API_VERSION,
            });
          },
          setFrameHeight: function (height) {
            if (height === undefined) {
              height = document.body.scrollHeight;
            }
            if (height === Streamlit.lastFrameHeight) {
              return;
            }
            Streamlit.lastFrameHeight = height;
            Streamlit.sendBackMsg("streamlit:setFrameHeight", { height: height });
          },
          setComponentValue: function (value) {
            Streamlit.sendBackMsg("streamlit:setComponentValue", {
              value: value,
              dataType: "json",
            });
          },
          onMessageEvent: function (event) {
            if (event.data && event.data.type === RENDER_EVENT) {
              Streamlit.onRenderMessage(event.data);
            }
          },
          onRenderMessage: function (data) {
            var args = data.args || {};
            Streamlit.events.dispatchEvent(
              new CustomEvent(RENDER_EVENT, {
                detail: {
                  disabled: Boolean(data.disabled),
                  args: args,
                  theme: data.theme,
                },
              })
            );
          },
          sendBackMsg: function (type, payload) {
            window.parent.postMessage(
              Object.assign({ isStreamlitMessage: true, type: type }, payload),
              "*"
            );
          },
        };
        window.Streamlit = Streamlit;
      })();
    </script>

    <script>
      let chartInstances = [];
      let captureSent = false;

      function disposeCharts() {
        chartInstances.forEach(function (instance) {
          instance.dispose();
        });
        chartInstances = [];
      }

      function captureCharts() {
        if (captureSent || chartInstances.length === 0) {
          return;
        }
        captureSent = true;
        try {
          const pngs = chartInstances.map(function (instance) {
            return instance.getDataURL({
              type: "png",
              pixelRatio: 2,
              backgroundColor: "#ffffff",
            });
          });
          Streamlit.setComponentValue({ pngs: pngs });
        } catch (error) {
          Streamlit.setComponentValue(null);
        }
      }

      function renderCharts(args) {
        disposeCharts();
        captureSent = false;

        const root = document.getElementById("charts-root");
        root.innerHTML = "";

        const specs = args.charts || [];
        if (!specs.length) {
          Streamlit.setComponentValue(null);
          return;
        }

        let pending = specs.length;

        function markDone() {
          pending -= 1;
          if (pending <= 0) {
            captureCharts();
          }
        }

        specs.forEach(function (spec, index) {
          const host = document.createElement("div");
          host.className = "chart-host";
          host.style.height = (spec.height || 800) + "px";
          root.appendChild(host);

          const instance = echarts.init(host, null, { renderer: "canvas" });
          chartInstances.push(instance);

          instance.on("finished", markDone);
          instance.setOption(spec.option || {}, { notMerge: true });
          instance.resize();
        });

        setTimeout(function () {
          if (!captureSent) {
            captureCharts();
          }
        }, 4000);
      }

      function onRender(event) {
        const args = event.detail.args;
        if (!args || !args.charts || !args.charts.length) {
          Streamlit.setComponentValue(null);
          return;
        }
        renderCharts(args);
      }

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(0);
    </script>
  </body>
</html>
